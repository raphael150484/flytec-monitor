<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Ícone para iPhone/iPad -->
<link rel="apple-touch-icon" href="/logo_flytec_2_.png">
<link rel="icon" type="image/png" href="/logo_flytec_2_.png">

<!-- Nome que aparece embaixo do ícone na tela do celular -->
<meta name="application-name" content="FlyTEC Monitor">
<meta name="apple-mobile-web-app-title" content="FlyTEC Monitor">
<meta name="apple-mobile-web-app-capable" content="yes">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Gerenciar Usuários - FlyTEC</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .appbar {
      background: #1e293b;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .appbar-left { display: flex; align-items: center; gap: 12px; }
    .logo-flytec { height: 46px; width: auto; object-fit: contain; }
    .appbar-title { font-size: 1rem; font-weight: 700; color: #38bdf8; }
    .appbar-sub { font-size: 0.7rem; color: #64748b; margin-top: 2px; }
    .back-btn {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 99px;
      color: #e2e8f0;
      font-size: 0.78rem;
      padding: 5px 14px;
      cursor: pointer;
      text-decoration: none;
    }
    .back-btn:hover { border-color: #38bdf8; }

    .content { padding: 16px; max-width: 540px; margin: 0 auto; }

    .section {
      background: #1e293b;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #38bdf8;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid #334155;
    }

    .field { margin-bottom: 12px; }
    .label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 5px; }
    .input {
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.88rem;
    }
    .input:focus { outline: none; border-color: #38bdf8; }
    select.input { cursor: pointer; }

    /* Checkboxes de dispositivos */
    .devices-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 4px;
    }
    .device-check {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .device-check:hover { border-color: #38bdf8; }
    .device-check input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #38bdf8;
      cursor: pointer;
    }
    .device-check-label { font-size: 0.85rem; color: #e2e8f0; }
    .device-check-guid { font-size: 0.65rem; color: #475569; margin-top: 2px; }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      margin-top: 6px;
    }
    .btn:disabled { opacity: 0.5; cursor: default; }

    .msg {
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: center;
      display: none;
    }
    .msg.ok    { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .msg.error { background: #450a0a; color: #f87171; border: 1px solid #7f1d1d; }

    /* Lista de usuários */
    .user-item {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      background: #0f172a;
    }
    .user-item:last-child { margin-bottom: 0; }
    .user-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .user-item-name { font-size: 0.88rem; font-weight: 600; color: #e2e8f0; }
    .user-item-role { font-size: 0.68rem; color: #64748b; margin-top: 2px; }

    .btn-remove {
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: #f87171;
      border-radius: 99px;
      font-size: 0.7rem;
      padding: 5px 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-remove:hover { background: #7f1d1d; }
    .tag-voce {
      font-size: 0.68rem;
      color: #475569;
      border: 1px solid #334155;
      border-radius: 99px;
      padding: 3px 10px;
    }

    /* Permissões de dispositivos por usuário */
    .perm-title {
      font-size: 0.72rem;
      color: #64748b;
      margin-bottom: 6px;
    }
    .perm-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .perm-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
    }
    .perm-item input[type="checkbox"] {
      accent-color: #38bdf8;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .btn-salvar-perm {
      background: #0f172a;
      border: 1px solid #38bdf8;
      color: #38bdf8;
      border-radius: 99px;
      font-size: 0.72rem;
      padding: 5px 14px;
      cursor: pointer;
    }
    .btn-salvar-perm:hover { background: #38bdf8; color: #0f172a; }

    .empty { text-align: center; color: #475569; font-size: 0.82rem; padding: 20px 0; }
  </style>
</head>
<body>

  <div class="appbar">
    <div class="appbar-left">
      <img src="logo_flytec_2_.png" class="logo-flytec" alt="FlyTEC" />
      <div>
        <div class="appbar-title">Gerenciar Usuários</div>
        <div class="appbar-sub">Somente administradores</div>
      </div>
    </div>
    <a class="back-btn" href="/">← Voltar</a>
  </div>

  <div class="content">

    <!-- Cadastrar novo usuário -->
    <div class="section">
      <div class="section-title">➕ Cadastrar novo usuário</div>

      <div class="field">
        <div class="label">Usuário</div>
        <input id="new-username" class="input" placeholder="ex: joao" autocomplete="off"/>
      </div>
      <div class="field">
        <div class="label">Senha</div>
        <input id="new-password" class="input" type="password" placeholder="Mínimo 6 caracteres"/>
      </div>
      <div class="field">
        <div class="label">Perfil</div>
        <select id="new-role" class="input">
          <option value="monitor">Monitor — só visualiza temperaturas</option>
          <option value="admin">Admin — pode gerenciar usuários</option>
        </select>
      </div>

      <div class="field" id="field-dispositivos">
        <div class="label">Aparelhos que este usuário pode ver</div>
        <div class="devices-grid" id="devices-cadastro">
          <div class="empty">Carregando aparelhos...</div>
        </div>
      </div>

      <button class="btn" id="btn-cadastrar">Cadastrar usuário</button>
      <div class="msg" id="msg-cadastrar"></div>
    </div>

    <!-- Lista de usuários -->
    <div class="section">
      <div class="section-title">👥 Usuários cadastrados</div>
      <div id="user-list"><div class="empty">Carregando...</div></div>
    </div>

  </div>

  <script>
    function getToken() { return localStorage.getItem('token'); }
    function getUser()  {
      try { return JSON.parse(localStorage.getItem('user')); } catch(e) { return null; }
    }
    function irParaLogin() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }

    // Só admin pode acessar
    (function() {
      const token = getToken();
      const user  = getUser();
      if (!token || !user || user.role !== 'admin') {
        window.location.href = '/';
      }
    })();

    let todosDispositivos = [];

    // ── Carregar lista de aparelhos disponíveis ──
    async function carregarDispositivos() {
      try {
        const resp = await fetch('/api/dispositivos-disponiveis', {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);
        todosDispositivos = json.data;
        renderCheckboxesCadastro();
      } catch(e) {
        document.getElementById('devices-cadastro').innerHTML =
          '<div class="empty">Erro ao carregar aparelhos.</div>';
      }
    }

    function renderCheckboxesCadastro() {
      const grid = document.getElementById('devices-cadastro');
      grid.innerHTML = '';
      todosDispositivos.forEach(d => {
        const label = document.createElement('label');
        label.className = 'device-check';
        label.innerHTML = `
          <input type="checkbox" value="${d.guid}" checked />
          <div>
            <div class="device-check-label">${d.nome}</div>
            <div class="device-check-guid">${d.guid}</div>
          </div>
        `;
        grid.appendChild(label);
      });
    }

    // Esconder seleção de aparelhos quando perfil é admin (vê tudo)
    document.getElementById('new-role').addEventListener('change', function() {
      document.getElementById('field-dispositivos').style.display =
        this.value === 'admin' ? 'none' : 'block';
    });

    // ── Mensagem de feedback ──
    function showMsg(id, tipo, texto) {
      const el = document.getElementById(id);
      el.className = 'msg ' + tipo;
      el.textContent = texto;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    // ── Carregar lista de usuários ──
    async function carregarUsuarios() {
      const list = document.getElementById('user-list');
      list.innerHTML = '<div class="empty">Carregando...</div>';
      try {
        const resp = await fetch('/api/usuarios', {
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        if (resp.status === 401) { irParaLogin(); return; }
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);

        const meUser = getUser();
        list.innerHTML = '';

        if (!json.data.length) {
          list.innerHTML = '<div class="empty">Nenhum usuário cadastrado.</div>';
          return;
        }

        json.data.forEach(u => {
          const souEu = u.username === meUser.username;
          const item  = document.createElement('div');
          item.className = 'user-item';

          // Checkboxes de permissão por usuário
          const permsHTML = todosDispositivos.map(d => {
            const checked = (u.dispositivos || []).includes(d.guid) ? 'checked' : '';
            return `
              <label class="perm-item">
                <input type="checkbox" value="${d.guid}" ${checked} ${souEu || u.role === 'admin' ? 'disabled' : ''} />
                ${d.nome}
              </label>
            `;
          }).join('');

          item.innerHTML = `
            <div class="user-item-header">
              <div>
                <div class="user-item-name">${u.username}</div>
                <div class="user-item-role">${u.role === 'admin' ? '⚙️ Admin' : '👁️ Monitor'}</div>
              </div>
              ${souEu
                ? '<span class="tag-voce">você</span>'
                : `<button class="btn-remove" data-id="${u.id}">Remover</button>`
              }
            </div>
            <div class="perm-title">Aparelhos liberados:</div>
            <div class="perm-grid" id="perm-${u.id}">${permsHTML}</div>
            ${!souEu && u.role !== 'admin'
              ? `<button class="btn-salvar-perm" data-id="${u.id}">💾 Salvar permissões</button>`
              : u.role === 'admin'
                ? '<div style="font-size:0.72rem;color:#475569">Admin tem acesso a todos os aparelhos.</div>'
                : ''
            }
          `;

          list.appendChild(item);
        });

        // Eventos de remoção
        list.querySelectorAll('.btn-remove').forEach(btn => {
          btn.addEventListener('click', async () => {
            if (!confirm('Tem certeza que deseja remover este usuário?')) return;
            btn.disabled = true;
            btn.textContent = 'Removendo...';
            await removerUsuario(btn.getAttribute('data-id'));
          });
        });

        // Eventos de salvar permissões
        list.querySelectorAll('.btn-salvar-perm').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id   = btn.getAttribute('data-id');
            const grid = document.getElementById('perm-' + id);
            const guids = Array.from(grid.querySelectorAll('input[type="checkbox"]:checked'))
              .map(cb => cb.value);
            btn.textContent = 'Salvando...';
            btn.disabled = true;
            await salvarPermissoes(id, guids);
            btn.textContent = '💾 Salvar permissões';
            btn.disabled = false;
          });
        });

      } catch(e) {
        list.innerHTML = '<div class="empty">Erro ao carregar usuários.</div>';
        console.error(e);
      }
    }

    // ── Remover usuário ──
    async function removerUsuario(id) {
      try {
        const resp = await fetch('/api/usuarios/' + id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + getToken() }
        });
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);
        carregarUsuarios();
      } catch(e) {
        alert('Erro ao remover: ' + e.message);
        carregarUsuarios();
      }
    }

    // ── Salvar permissões de dispositivos ──
    async function salvarPermissoes(id, dispositivos) {
      try {
        const resp = await fetch('/api/usuarios/' + id + '/dispositivos', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
          },
          body: JSON.stringify({ dispositivos })
        });
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);
        alert('Permissões salvas com sucesso!');
      } catch(e) {
        alert('Erro ao salvar permissões: ' + e.message);
      }
    }

    // ── Cadastrar novo usuário ──
    document.getElementById('btn-cadastrar').addEventListener('click', async () => {
      const username = document.getElementById('new-username').value.trim();
      const password = document.getElementById('new-password').value.trim();
      const role     = document.getElementById('new-role').value;

      if (!username) { showMsg('msg-cadastrar', 'error', 'Preencha o nome de usuário.'); return; }
      if (!password) { showMsg('msg-cadastrar', 'error', 'Preencha a senha.'); return; }
      if (password.length < 6) { showMsg('msg-cadastrar', 'error', 'A senha precisa ter pelo menos 6 caracteres.'); return; }

      // Pega dispositivos marcados
      const dispositivos = Array.from(
        document.querySelectorAll('#devices-cadastro input[type="checkbox"]:checked')
      ).map(cb => cb.value);

      if (role === 'monitor' && !dispositivos.length) {
        showMsg('msg-cadastrar', 'error', 'Selecione pelo menos um aparelho para este usuário.');
        return;
      }

      const btn = document.getElementById('btn-cadastrar');
      btn.disabled = true;
      btn.textContent = 'Cadastrando...';

      try {
        const resp = await fetch('/api/usuarios', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getToken()
          },
          body: JSON.stringify({ username, password, role, dispositivos })
        });
        if (resp.status === 401) { irParaLogin(); return; }
        const json = await resp.json();
        if (!json.success) throw new Error(json.error);

        showMsg('msg-cadastrar', 'ok', `Usuário "${username}" cadastrado com sucesso!`);
        document.getElementById('new-username').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('new-role').value = 'monitor';
        document.getElementById('field-dispositivos').style.display = 'block';
        renderCheckboxesCadastro();
        carregarUsuarios();
      } catch(e) {
        showMsg('msg-cadastrar', 'error', e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Cadastrar usuário';
      }
    });

    // Inicializa
    carregarDispositivos().then(() => carregarUsuarios());
  </script>
</body>
</html>
