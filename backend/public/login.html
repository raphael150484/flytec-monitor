<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="apple-touch-icon" href="/logo_flytec_2_.png">
<link rel="icon" type="image/png" href="/logo_flytec_2_.png">
<meta name="application-name" content="FlyTEC Monitor">
<meta name="apple-mobile-web-app-title" content="FlyTEC Monitor">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Login - FlyTEC Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-card {
      background: #1e293b;
      border-radius: 18px;
      padding: 24px 20px;
      width: 100%;
      max-width: 380px;
      border: 1px solid #334155;
      box-shadow: 0 15px 40px rgba(0,0,0,0.35);
    }
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    .logo-area img {
      height: 70px;
      object-fit: contain;
      margin-bottom: 8px;
    }
    .logo-area h1 {
      font-size: 1.05rem;
      color: #38bdf8;
      font-weight: 700;
    }
    .logo-area p {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 2px;
    }

    .field {
      margin-bottom: 14px;
    }
    .label {
      font-size: 0.78rem;
      color: #cbd5f5;
      margin-bottom: 5px;
    }
    .input {
      width: 100%;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #020617;
      color: #e2e8f0;
      font-size: 0.9rem;
    }
    .input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56,189,248,0.4);
    }

    .button {
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      margin-top: 8px;
    }
    .button:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .error {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #f97373;
      text-align: center;
      display: none;
    }

    .hint {
      margin-top: 14px;
      font-size: 0.7rem;
      color: #64748b;
      text-align: center;
    }
    .hint span {
      color: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <img src="logo_flytec_2_.png" alt="FlyTEC">
      <h1>FlyTEC Monitor</h1>
      <p>Acesso ao painel de temperatura</p>
    </div>

    <div class="field">
      <div class="label">Usuário</div>
      <input id="username" class="input" autocomplete="username" />
    </div>

    <div class="field">
      <div class="label">Senha</div>
      <input id="password" class="input" type="password" autocomplete="current-password" />
    </div>

    <button id="btn-login" class="button">Entrar</button>

    <div id="error" class="error"></div>

    <div class="hint">
      Primeiro acesso?<br/>
      <span>Usuário: admin &nbsp;•&nbsp; Senha: admin123</span> (troque depois).
    </div>
  </div>

  <script>
    const btn = document.getElementById('btn-login');
    const err = document.getElementById('error');

    btn.addEventListener('click', async () => {
      err.style.display = 'none';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!username || !password) {
        err.textContent = 'Preencha usuário e senha.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const resp = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await resp.json();

        if (!data.success) {
          throw new Error(data.error || 'Falha ao fazer login');
        }

        // guarda o token no navegador
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        // redireciona para o painel
        window.location.href = '/';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    // Se já tiver token salvo, manda direto para /
    (function() {
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = '/';
      }
    })();
  </script>
</body>
</html>
